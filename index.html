<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFIRM Korea 유치 사무국 Check List</title>
    
    <!-- Tailwind CSS (CDN 연동) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', 'sans-serif'] },
            animation: { 'spin-slow': 'spin 3s linear infinite' }
          }
        }
      }
    </script>
    
    <!-- 폰트 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <!-- React & ReactDOM (CDN 연동) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (브라우저 실시간 컴파일러) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 내장 SVG 아이콘 컴포넌트 ---
        const IconLoader = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconAlert = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconDashboard = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>;
        const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconCircleDashed = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.1 2.18a9.93 9.93 0 0 1 3.8 0"/><path d="M17.6 3.71a9.95 9.95 0 0 1 2.69 2.7"/><path d="M21.82 10.1a9.93 9.93 0 0 1 0 3.8"/><path d="M20.29 17.6a9.95 9.95 0 0 1-2.7 2.69"/><path d="M13.9 21.82a9.94 9.94 0 0 1-3.8 0"/><path d="M6.4 20.29a9.95 9.95 0 0 1-2.69-2.7"/><path d="M2.18 13.9a9.93 9.93 0 0 1 0-3.8"/><path d="M3.71 6.4a9.95 9.95 0 0 1 2.7-2.69"/></svg>;
        const IconClock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconListTodo = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>;
        const IconExternalLink = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconRefresh = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconFilter = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

        function App() {
          const [data, setData] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [lastUpdated, setLastUpdated] = useState(null);
          const [isRefreshing, setIsRefreshing] = useState(false);

          // 다중 필터 상태 관리
          const [filters, setFilters] = useState({ date: '', category: '', status: '', assignee: '' });

          // 구글 시트 ID
          const SHEET_ID = '1NuNjfn6mJh_WjavRslIi68UwsyChIfaCLwJMBXStevc';

          // 상태 클로저 트랩 방지를 위한 참조 훅
          const fetchSheetDataRef = React.useRef();
          
          useEffect(() => {
            fetchSheetDataRef.current = fetchSheetData;
          });

          // 재귀적 폴링 아키텍처
          useEffect(() => {
            let isCancelled = false;
            let timerId;

            const pollData = async () => {
              if (isCancelled) return;
              await fetchSheetDataRef.current(true);
              timerId = setTimeout(pollData, 10000); 
            };

            fetchSheetDataRef.current(false).then(() => {
              timerId = setTimeout(pollData, 10000);
            });

            return () => {
              isCancelled = true;
              clearTimeout(timerId);
            };
          }, []);

          const fetchSheetData = async (isBackground = false) => {
            try {
              if (!isBackground) setLoading(true);
              else setIsRefreshing(true);
              
              setError(null);
              
              const jsonData = await new Promise((resolve, reject) => {
                const callbackName = 'gvizCallback_' + Date.now() + Math.floor(Math.random() * 1000);
                
                window[callbackName] = (data) => {
                  delete window[callbackName];
                  document.body.removeChild(script);
                  resolve(data);
                };

                const script = document.createElement('script');
                script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${callbackName}&gid=0&nocache=${Date.now()}`;
                
                script.onerror = () => {
                  delete window[callbackName];
                  document.body.removeChild(script);
                  reject(new Error('네트워크 연결이 불안정하거나 보안 정책(CORS)에 의해 차단되었습니다.'));
                };

                document.body.appendChild(script);
              });

              if (jsonData.status === 'error') {
                  const errorMsg = jsonData.errors && jsonData.errors[0] ? jsonData.errors[0].message : '알 수 없는 Google API 에러';
                  throw new Error(`구글 시트 에러: ${errorMsg}`);
              }

              if (!jsonData?.table?.rows) throw new Error('테이블 데이터 포맷이 일치하지 않습니다.');

              const parsedData = jsonData.table.rows.map(row => {
                const cells = row.c || [];
                // 1. 구글 시트 데이터 파싱 개선 (f 속성 우선, v 속성 대체)
                const getVal = (idx) => {
                  const cell = cells[idx];
                  return cell?.f ? String(cell.f).trim() : (cell?.v ? String(cell.v).trim() : '');
                };

                // 2. 날짜 파싱 로직 (MM.DD. 형식으로 변환)
                let rawDate = getVal(0);
                let formattedDate = rawDate;
                
                if (rawDate) {
                  // Gviz Date 포맷 파싱 (예: Date(2023, 9, 23))
                  const dateMatch = rawDate.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                  if (dateMatch) {
                    const month = String(parseInt(dateMatch[2]) + 1).padStart(2, '0');
                    const day = String(dateMatch[3]).padStart(2, '0');
                    formattedDate = `${month}.${day}.`;
                  } else {
                     // 일반 문자열 (예: 2023-10-23, 10/23 등)에서 MM.DD. 시도
                     const parts = rawDate.split(/[-./\s]/).filter(Boolean);
                     if(parts.length >= 2) {
                        const m = parts[parts.length-2].padStart(2,'0');
                        const d = parts[parts.length-1].padStart(2,'0');
                        formattedDate = `${m}.${d}.`;
                     }
                  }
                }

                return {
                  date: formattedDate, // 기존 id -> date
                  category: getVal(1), 
                  task: getVal(2), 
                  status: getVal(3), 
                  assignee: getVal(4)  // 기존 note -> assignee
                };
              }).filter((r) => {
                if (!r.category || !r.task) return false;
                if (r.category === '구분' || r.task === '업무명') return false; // 헤더 행 제외
                return true;
              });

              setData(parsedData);
              setLastUpdated(new Date());
              
            } catch (err) {
              console.error('Data Fetching Analysis:', err);
              setError(`데이터 연동 중 문제가 발생했습니다: ${err.message}`);
            } finally {
              if (!isBackground) setLoading(false);
              else setIsRefreshing(false);
            }
          };

          const handleRefresh = () => fetchSheetData(true);

          const formatTime = (date) => {
            if (!date) return '-';
            return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          };

          // --- 필터용 고유 옵션 추출 ---
          const filterOptions = useMemo(() => {
            const options = { date: new Set(), category: new Set(), status: new Set(), assignee: new Set() };
            
            data.forEach(item => {
              if (item.date) options.date.add(item.date);
              if (item.category) options.category.add(item.category);
              if (item.status) {
                  const normStatus = item.status.replace(/\s+/g, '');
                  options.status.add(normStatus);
              }
              if (item.assignee) {
                // 변경: 쉼표를 기준으로 이름을 분리하여 중복 없이 개별 추출
                const names = item.assignee.split(',').map(name => name.trim()).filter(Boolean);
                names.forEach(name => options.assignee.add(name));
              }
            });

            return {
              date: Array.from(options.date).sort(),
              category: Array.from(options.category).sort(),
              status: Array.from(options.status).sort(),
              assignee: Array.from(options.assignee).sort()
            };
          }, [data]);

          // --- 데이터 필터링 적용 ---
          const filteredData = useMemo(() => {
            return data.filter(item => {
              const normStatus = item.status.replace(/\s+/g, '');
              let match = true;
              
              if (filters.date && item.date !== filters.date) match = false;
              if (filters.category && item.category !== filters.category) match = false;
              if (filters.status && normStatus !== filters.status) match = false;
              
              // 변경: 부분 일치나 결합된 문자열이 아닌, 개별 이름 배열 내 포함 여부 검증
              if (filters.assignee) {
                if (!item.assignee) {
                  match = false;
                } else {
                  const names = item.assignee.split(',').map(n => n.trim());
                  if (!names.includes(filters.assignee)) match = false;
                }
              }
              
              return match;
            });
          }, [data, filters]);

          const handleFilterChange = (e) => {
            const { name, value } = e.target;
            setFilters(prev => ({ ...prev, [name]: value }));
          };

          const clearFilters = () => {
            setFilters({ date: '', category: '', status: '', assignee: '' });
          };

          // --- 통계 연산 (필터링 전 전체 데이터 기준 유지 또는 필터 기준 변경 가능. 여기서는 전체 데이터 유지) ---
          const stats = useMemo(() => {
            let totalTasks = 0, totalCompleted = 0;
            const categories = {
              '용역사': { total: 0, completed: 0, color: 'purple' },
              '연구원': { total: 0, completed: 0, color: 'blue' },
              '경북도': { total: 0, completed: 0, color: 'emerald' },
              '기타': { total: 0, completed: 0, color: 'orange' }
            };
            const normalizeStatus = (s) => s.replace(/\s+/g, '');

            data.forEach(item => {
              totalTasks++;
              const isCompleted = normalizeStatus(item.status) === '완료';
              if (isCompleted) totalCompleted++;

              let catKey = item.category;
              if (!categories[catKey]) catKey = '기타'; 

              categories[catKey].total++;
              if (isCompleted) categories[catKey].completed++;
            });

            const overallProgress = totalTasks === 0 ? 0 : Math.round((totalCompleted / totalTasks) * 100);
            return { totalTasks, totalCompleted, overallProgress, categories };
          }, [data]);

          if (loading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center font-sans">
                <IconLoader className="w-10 h-10 text-blue-500 animate-spin mb-4" />
                <p className="text-slate-600 font-medium tracking-wide">데이터를 동기화하고 있습니다...</p>
              </div>
            );
          }

          if (error) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
                <div className="bg-white p-6 md:p-8 rounded-2xl max-w-lg w-full text-center shadow-lg border border-red-100 flex flex-col items-center">
                  <div className="bg-red-50 p-4 rounded-full mb-4"><IconAlert className="w-10 h-10 text-red-500" /></div>
                  <h2 className="text-xl font-bold mb-3 text-slate-800">데이터 연동 실패</h2>
                  <p className="text-slate-500 text-sm mb-6 leading-relaxed break-keep">{error}</p>
                  <div className="flex flex-col sm:flex-row gap-3 w-full">
                     <button onClick={() => window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank')} className="flex-1 flex items-center justify-center px-4 py-3 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition-colors text-sm">
                      <IconExternalLink className="w-4 h-4 mr-2" /> 시트 확인
                    </button>
                    <button onClick={fetchSheetData} className="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition-colors text-sm shadow-sm">
                      다시 시도
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          const getColorStyle = (colorName) => {
            const map = {
              purple: { text: 'text-purple-600', bg: 'bg-purple-50', bar: 'bg-purple-400' },
              blue: { text: 'text-blue-600', bg: 'bg-blue-50', bar: 'bg-blue-400' },
              emerald: { text: 'text-emerald-600', bg: 'bg-emerald-50', bar: 'bg-emerald-400' },
              orange: { text: 'text-orange-600', bg: 'bg-orange-50', bar: 'bg-orange-400' },
            };
            return map[colorName] || map.blue;
          };

          const StatusBadge = ({ status }) => {
            const s = status.replace(/\s+/g, '');
            if (s === '완료') {
              return <span className="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100 whitespace-nowrap"><IconCheckCircle className="w-3.5 h-3.5 mr-1.5 text-emerald-500" /> 완료</span>;
            }
            if (s === '확인중') {
              return <span className="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-100 whitespace-nowrap"><IconCircleDashed className="w-3.5 h-3.5 mr-1.5 text-blue-500 animate-[spin_3s_linear_infinite]" /> 확인 중</span>;
            }
            return <span className="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold bg-slate-100 text-slate-600 border border-slate-200 whitespace-nowrap"><IconClock className="w-3.5 h-3.5 mr-1.5 text-slate-400" /> 준비 중</span>;
          };

          const radius = 60;
          const circumference = 2 * Math.PI * radius;
          const strokeDashoffset = circumference - (stats.overallProgress / 100) * circumference;
          
          const isFilterActive = Object.values(filters).some(val => val !== '');

          return (
            <div className="min-h-screen p-3 sm:p-4 md:p-8 font-sans text-slate-800">
              <div className="max-w-[1200px] mx-auto space-y-4 md:space-y-6">
                
                {/* --- Header Section --- */}
                <header className="flex flex-col xl:flex-row xl:items-center justify-between bg-white p-4 sm:p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 gap-4 relative">
                  {/* Title Area */}
                  <div className="flex items-start md:items-center gap-3 md:gap-4">
                    <div className="bg-blue-50 p-2.5 rounded-xl border border-blue-100 shrink-0 mt-1 md:mt-0">
                      <IconDashboard className="w-6 h-6 text-blue-600" />
                    </div>
                    <div>
                      <h1 className="text-lg sm:text-xl md:text-2xl lg:text-3xl font-bold text-slate-900 tracking-tight break-keep leading-snug">
                        WFIRM Korea 유치 사무국 Check List
                      </h1>
                    </div>
                  </div>

                  {/* Controls Area */}
                  <div className="flex flex-wrap items-center justify-between xl:justify-end gap-3 w-full xl:w-auto mt-2 xl:mt-0 border-t border-slate-100 pt-3 xl:border-0 xl:pt-0">
                    
                    {/* 원본 시트 바로가기 버튼 추가 */}
                    <button 
                      onClick={() => window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank')}
                      className="flex items-center gap-1.5 px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-xs sm:text-sm font-bold hover:bg-slate-200 transition-colors shrink-0"
                    >
                      <IconExternalLink className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> 원본 시트
                    </button>

                    <div className="flex items-center gap-3 shrink-0">
                      <div className="flex flex-col items-start sm:items-end">
                        <span className="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded-sm mb-0.5">GVIZ (LIVE)</span>
                        <span className="text-[10px] sm:text-[11px] text-slate-500 font-medium whitespace-nowrap">업데이트: {formatTime(lastUpdated)}</span>
                      </div>
                      <button onClick={handleRefresh} disabled={isRefreshing} className="flex items-center gap-1.5 px-3 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs sm:text-sm font-bold hover:bg-indigo-100 transition-colors disabled:opacity-50 shrink-0">
                        <IconRefresh className={`w-3.5 h-3.5 sm:w-4 sm:h-4 ${isRefreshing ? 'animate-spin' : ''}`} /> 새로고침
                      </button>
                      <div className="hidden sm:block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse shrink-0"></div>
                    </div>
                    <div className="hidden sm:block w-px h-10 bg-slate-200"></div>
                    <div className="flex bg-slate-50 px-3 sm:px-4 md:px-5 py-2 sm:py-2.5 rounded-xl border border-slate-100 flex-col items-end shrink-0 ml-auto sm:ml-0">
                      <span className="text-[9px] sm:text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-0.5 whitespace-nowrap">Total Tasks</span>
                      <div className="text-base sm:text-lg md:text-xl font-bold text-slate-800 leading-none">
                        {stats.totalTasks}<span className="text-[10px] sm:text-xs md:text-sm font-medium text-slate-500 ml-1">건</span>
                      </div>
                    </div>
                  </div>
                </header>

                {/* --- Metrics Grid --- */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
                  {/* Overall Progress */}
                  <div className="lg:col-span-4 bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-100 flex flex-col items-center justify-center relative min-h-[240px] md:min-h-[280px]">
                    <div className="w-full flex justify-between items-center mb-6 absolute top-5 left-5 right-5 px-0">
                      <h3 className="text-sm font-bold text-slate-700">전체 진척도</h3>
                      <span className="text-xs font-semibold text-slate-400 bg-slate-50 px-2 py-1 rounded-md">Overall</span>
                    </div>
                    <div className="relative w-32 h-32 md:w-40 md:h-40 mt-8 flex items-center justify-center">
                      <svg className="w-full h-full transform -rotate-90" viewBox="0 0 160 160">
                        <circle cx="80" cy="80" r={radius} fill="none" stroke="#f1f5f9" strokeWidth="12" />
                        <circle cx="80" cy="80" r={radius} fill="none" stroke="#3b82f6" strokeWidth="12" strokeLinecap="round" className="transition-all duration-1000 ease-out" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} />
                      </svg>
                      <div className="absolute flex flex-col items-center justify-center">
                        <span className="text-2xl md:text-3xl font-bold text-slate-800">{stats.overallProgress}%</span>
                      </div>
                    </div>
                    <div className="mt-5 md:mt-6 bg-slate-50 border border-slate-100 px-4 py-2 rounded-lg text-xs md:text-sm font-medium text-slate-600 flex items-center gap-2">
                      완료된 항목 <span className="font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-sm md:text-base">{stats.totalCompleted}</span> / {stats.totalTasks}
                    </div>
                  </div>

                  {/* Category Progress Bars */}
                  <div className="lg:col-span-8 grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                    {Object.entries(stats.categories).map(([name, stat]) => {
                      const progress = stat.total === 0 ? 0 : Math.round((stat.completed / stat.total) * 100);
                      const colors = getColorStyle(stat.color);
                      return (
                        <div key={name} className="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-100 flex flex-col justify-center">
                          <div className="flex justify-between items-end mb-4">
                            <div className="flex items-center gap-2">
                              <div className={`w-2 h-5 md:h-6 rounded-sm ${colors.bar}`}></div>
                              <span className="text-sm md:text-base font-bold text-slate-800">{name}</span>
                            </div>
                            <span className="text-xl md:text-2xl font-bold text-slate-800">{progress}%</span>
                          </div>
                          <div className="mt-1 md:mt-2">
                            <div className="flex justify-between text-[10px] md:text-xs font-medium text-slate-500 mb-1.5 md:mb-2">
                              <span>진행 현황</span>
                              <span>{stat.completed} / {stat.total} 건</span>
                            </div>
                            <div className="h-1.5 md:h-2 w-full rounded-full bg-slate-100 overflow-hidden">
                              <div className={`h-full rounded-full ${colors.bar} transition-all duration-1000 ease-out`} style={{ width: `${progress}%` }}></div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* --- Table Section --- */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[600px]">
                  
                  {/* Table Toolbar / Filter Section */}
                  <div className="px-4 md:px-6 py-4 border-b border-slate-100 bg-slate-50/80 shrink-0">
                    <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                      <div className="flex items-center gap-2">
                        <IconListTodo className="w-4 h-4 md:w-5 md:h-5 text-slate-500" />
                        <h3 className="text-sm md:text-base font-bold text-slate-800">세부 업무 체크리스트</h3>
                        <span className="ml-2 text-xs font-medium bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500">
                          {filteredData.length}건 검색됨
                        </span>
                      </div>
                      
                      {/* Filter Controls */}
                      <div className="flex flex-wrap items-center gap-2">
                        <IconFilter className="w-4 h-4 text-slate-400 mr-1 hidden sm:block" />
                        
                        <select name="date" value={filters.date} onChange={handleFilterChange} className="text-xs md:text-sm border border-slate-200 rounded-lg px-2 py-2 md:py-1.5 bg-white text-slate-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 cursor-pointer shadow-sm">
                          <option value="">모든 날짜</option>
                          {filterOptions.date.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                        
                        <select name="category" value={filters.category} onChange={handleFilterChange} className="text-xs md:text-sm border border-slate-200 rounded-lg px-2 py-2 md:py-1.5 bg-white text-slate-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 cursor-pointer shadow-sm">
                          <option value="">모든 구분</option>
                          {filterOptions.category.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>

                        <select name="status" value={filters.status} onChange={handleFilterChange} className="text-xs md:text-sm border border-slate-200 rounded-lg px-2 py-2 md:py-1.5 bg-white text-slate-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 cursor-pointer shadow-sm">
                          <option value="">모든 상태</option>
                          {filterOptions.status.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>

                        <select name="assignee" value={filters.assignee} onChange={handleFilterChange} className="text-xs md:text-sm border border-slate-200 rounded-lg px-2 py-2 md:py-1.5 bg-white text-slate-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 cursor-pointer min-w-[100px] truncate shadow-sm">
                          <option value="">모든 담당자</option>
                          {filterOptions.assignee.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>

                        {isFilterActive && (
                          <button onClick={clearFilters} className="text-xs font-medium text-slate-500 hover:text-red-500 px-2 py-2 md:py-1 transition-colors underline underline-offset-2">
                            초기화
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Table Content (Scrollable with Sticky Header) */}
                  <div className="overflow-auto flex-1 relative">
                    <table className="w-full text-left border-collapse min-w-[700px]">
                      <thead className="sticky top-0 z-10 bg-white shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
                        <tr className="text-xs font-bold text-slate-600 uppercase tracking-wider bg-slate-100">
                          <th className="py-3 px-4 w-20 text-center whitespace-nowrap border-b border-slate-200">날짜</th>
                          <th className="py-3 px-4 w-24 text-center whitespace-nowrap border-b border-slate-200">구분</th>
                          <th className="py-3 px-4 w-auto border-b border-slate-200">업무명</th>
                          <th className="py-3 px-4 w-32 text-center whitespace-nowrap border-b border-slate-200">진행 상태</th>
                          <th className="py-3 px-4 w-32 text-center whitespace-nowrap border-b border-slate-200">담당자</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm text-slate-700 divide-y divide-slate-100">
                        {filteredData.map((row, idx) => (
                          <tr key={idx} className="hover:bg-blue-50/50 transition-colors group">
                            {/* 날짜 데이터 출력 */}
                            <td className="py-3.5 px-4 text-center text-slate-500 font-semibold whitespace-nowrap">{row.date || '-'}</td>
                            <td className="py-3.5 px-4 text-center whitespace-nowrap">
                              <span className={`px-2 py-1 rounded text-xs font-bold whitespace-nowrap ${getColorStyle(stats.categories[row.category]?.color || 'orange').bg} ${getColorStyle(stats.categories[row.category]?.color || 'orange').text}`}>
                                {row.category}
                              </span>
                            </td>
                            <td className="py-3.5 px-4 font-medium text-slate-800 break-keep">{row.task}</td>
                            <td className="py-3.5 px-4 text-center whitespace-nowrap"><StatusBadge status={row.status} /></td>
                            {/* 담당자 데이터 출력 */}
                            <td className="py-3.5 px-4 text-center text-slate-600 text-xs font-medium whitespace-nowrap">{row.assignee || '-'}</td>
                          </tr>
                        ))}
                        {filteredData.length === 0 && (
                          <tr>
                            <td colSpan="5" className="py-16 text-center">
                              <div className="flex flex-col items-center justify-center space-y-3">
                                <IconListTodo className="w-10 h-10 text-slate-300" />
                                <p className="text-slate-500 font-medium">검색 조건에 일치하는 업무가 없습니다.</p>
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
